version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 22
        - nvm use 22
        - npx --yes pnpm@10 install --frozen-lockfile
    build:
      commands:
        - npx --yes pnpm@10 run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
