version: 1
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf node_modules
        - nvm install 24
        - nvm use 24
        - npx --yes pnpm@10 install --frozen-lockfile
    build:
      commands:
        - npx --yes pnpm@10 run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
